<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Manewry z pierwszej pomocy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000; /* jeśli masz tło jako obraz, możesz tu dać background-image */
      color: #fff;
    }

    .banner {
      position: relative;
      width: 100%;
      height: 400px; /* dopasuj do swojej grafiki */
      background: url('twoje-tlo.jpg') center/cover no-repeat;
    }

    .main-title {
      position: absolute;
      top: 20%;
      left: 10%;
      font-size: 48px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hashtag {
      position: absolute;
      top: 55%;          /* pod głównym napisem */
      right: 10%;        /* po prawej stronie */
      font-size: 24px;
      font-weight: 600;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="main-title">Manewry z pierwszej pomocy</div>
    <div class="hashtag">#strażacyzzajezdni</div>
  </div>
</body>
</html>
